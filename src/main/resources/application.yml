server:
  port: 8080

spring:
  application:
    name: stockpulse
  datasource:
    url: jdbc:postgresql://localhost:5432/stockpulse
    username: ${DB_USERNAME:stockpulse}
    password: ${DB_PASSWORD:stockpulse}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:default-dev-secret-must-be-at-least-32-characters-long}
  access-token-expiry-ms: 1800000
  refresh-token-expiry-ms: 604800000

websocket:
  allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:5173}

external:
  coingecko:
    base-url: ${COINGECKO_BASE_URL:https://api.coingecko.com/api/v3}
  yahoo:
    base-url: ${YAHOO_BASE_URL:https://query1.finance.yahoo.com}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    root: INFO
    com.stockpulse: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
